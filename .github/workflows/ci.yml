name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_call: # lets release.yml re-run this whole workflow as a gate

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache-dependency-path: go.work.sum

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Check formatting
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Not gofmt'd:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: Verify modules
        run: go mod verify

      - name: Run linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Run security scan
        uses: securego/gosec@master
        with:
          args: ./...

      - name: Unit tests (race detector)
        run: go test -race ./...

      - name: DOM tests (jsdom)
        run: make test-dom

  build-examples:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache-dependency-path: go.work.sum

      - name: Build CLI
        run: go build -o vane .

      - name: Build all examples + site against this branch's core/internal
        run: |
          set -e
          for d in examples/*/ vane-page; do
            echo "=== $d ==="
            rel=$(realpath --relative-to="$d" .)
            (cd "$d" && go mod edit -replace github.com/filipejohansson/vane="$rel")
            ./vane build "$d"
          done
