version: "2"
linters:
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Test setup code (os.WriteFile, os.MkdirAll, json.Unmarshal on trusted
      # fixtures) - checking every error here is noise, not signal.
      - linters:
          - errcheck
        path: _test\.go$
    paths:
      - third_party$
      - builtin$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
